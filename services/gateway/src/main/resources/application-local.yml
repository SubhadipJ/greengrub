# Local-only profile. Production traffic terminates at GCP API Gateway, so
# routing/JWT/rate-limit here exists to mirror the trust contract for devs.

spring:
  cloud:
    gateway:
      server:
        webmvc:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true
          default-filters:
            - DedupeResponseHeader=Vary Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
          http-client:
            connect-timeout: 2s
            read-timeout: 5s
          routes:
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**
              filters:
                # Strip any client-supplied identity headers BEFORE the JWT
                # filter writes the authentic ones. Belt-and-suspenders with
                # the JWT filter's request wrapper.
                - RemoveRequestHeader=X-User-Id
                - RemoveRequestHeader=X-User-Email
                - RemoveRequestHeader=X-User-Role
                - name: CircuitBreaker
                  args:
                    id: userServiceBreaker
                    fallbackUri: forward:/fallback/user-service
            - id: donation-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/donations/**
              filters:
                - RemoveRequestHeader=X-User-Id
                - RemoveRequestHeader=X-User-Email
                - RemoveRequestHeader=X-User-Role
                - name: CircuitBreaker
                  args:
                    id: donationServiceBreaker
                    fallbackUri: forward:/fallback/donation-service
            - id: food-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/food-requests/**
              filters:
                - RemoveRequestHeader=X-User-Id
                - RemoveRequestHeader=X-User-Email
                - RemoveRequestHeader=X-User-Role
                - name: CircuitBreaker
                  args:
                    id: foodServiceBreaker
                    fallbackUri: forward:/fallback/food-service

resilience4j:
  circuitbreaker:
    instances:
      userServiceBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      donationServiceBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      foodServiceBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  timelimiter:
    instances:
      userServiceBreaker:
        timeout-duration: 5s
        cancel-running-future: true
      donationServiceBreaker:
        timeout-duration: 5s
        cancel-running-future: true
      foodServiceBreaker:
        timeout-duration: 5s
        cancel-running-future: true

# Must match user-service's default for local dev; override via env in any
# non-local environment. HS256, 24h.
jwt:
  secret: ${JWT_SECRET:YourVerySecureSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}

logging:
  level:
    root: INFO
    com.greengrub.gateway: INFO

app:
  rate-limit:
    requests-per-minute: 100
    burst: 20
    cache-max-size: 50000
  # Paths that bypass JWT validation. Identity headers are still stripped on
  # these paths (see JwtAuthenticationFilter#stripIdentityHeaders), so /signup
  # cannot be used to spoof X-User-* into a downstream.
  public-paths:
    - "POST /api/v1/auth/signup"
    - "POST /api/v1/auth/login"
    - "GET /api/v1/auth/validate"
    - "GET /api/v1/users/check-email"
    - "/actuator/**"
    - "/v3/api-docs/**"
    - "/swagger-ui/**"
    - "/swagger-ui.html"
    - "/fallback/**"
