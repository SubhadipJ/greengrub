spring:
  cloud:
    gateway:
      server:
        webmvc:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true
          default-filters:
            - DedupeResponseHeader=Vary Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
          http-client:
            connect-timeout: 2s
            read-timeout: 15s
          routes:
            - id: user-service
              uri: http://customer-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**
              filters:
                - RemoveRequestHeader=X-User-Id
                - RemoveRequestHeader=X-User-Email
                - RemoveRequestHeader=X-User-Role
                - name: CircuitBreaker
                  args:
                    id: userServiceBreaker
                    fallbackUri: forward:/fallback/user-service
            - id: donation-service
              uri: http://donation-service
              predicates:
                - Path=/api/v1/donations/**
              filters:
                - RemoveRequestHeader=X-User-Id
                - RemoveRequestHeader=X-User-Email
                - RemoveRequestHeader=X-User-Role
                - name: CircuitBreaker
                  args:
                    id: donationServiceBreaker
                    fallbackUri: forward:/fallback/donation-service
            - id: food-service
              uri: http://food-service
              predicates:
                - Path=/api/v1/food-requests/**
              filters:
                - RemoveRequestHeader=X-User-Id
                - RemoveRequestHeader=X-User-Email
                - RemoveRequestHeader=X-User-Role
                - name: CircuitBreaker
                  args:
                    id: foodServiceBreaker
                    fallbackUri: forward:/fallback/food-service

resilience4j:
  circuitbreaker:
    instances:
      userServiceBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        automatic-transition-from-open-to-half-open-enabled: true
      donationServiceBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        automatic-transition-from-open-to-half-open-enabled: true
      foodServiceBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      userServiceBreaker:
        timeout-duration: 15s
        cancel-running-future: true
      donationServiceBreaker:
        timeout-duration: 15s
        cancel-running-future: true
      foodServiceBreaker:
        timeout-duration: 15s
        cancel-running-future: true

jwt:
  secret: ${JWT_SECRET}

app:
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_RPM:100}
    burst: ${RATE_LIMIT_BURST:20}
    cache-max-size: 50000
  public-paths:
    - "POST /api/v1/auth/signup"
    - "POST /api/v1/auth/login"
    - "GET /api/v1/auth/validate"
    - "GET /api/v1/users/check-email"
    - "/actuator/**"
    - "/v3/api-docs/**"
    - "/swagger-ui/**"
    - "/swagger-ui.html"
    - "/fallback/**"

logging:
  level:
    root: INFO
    com.greengrub.gateway: INFO
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

eureka:
  client:
    enabled: false
