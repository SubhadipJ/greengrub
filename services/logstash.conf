input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Parse the logger name into a short service label
  if [logger_name] {
    mutate {
      add_field => { "service" => "%{[logger_name]}" }
    }
  }

  # Normalize timestamp from logback's @timestamp
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Promote Spring log level to a standard field
  if [level] {
    mutate {
      rename => { "level" => "log_level" }
    }
  }

  # Drop Actuator health-check noise to keep index lean
  if [message] =~ /actuator\/health/ {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "greengrub-logs-%{+YYYY.MM.dd}"
  }
  # Uncomment for pipeline debugging:
  # stdout { codec => rubydebug }
}
