version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: greengrub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greengrub
    ports:
      - "5432:5432"
    networks:
      - microservice-net

  adminer:
    image: adminer
    container_name: greengrub-adminer
    ports:
      - "8088:8080"
    networks:
      - microservice-net

  mongodb:
    image: mongo:7
    container_name: greengrub-mongo
    ports:
      - "27017:27017"
    networks:
      - microservice-net

  mongo-express:
    image: mongo-express
    container_name: greengrub-mongo-ui
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
    ports:
      - "8089:8081"
    networks:
      - microservice-net

  kafka:
    image: bitnami/kafka:3.6
    container_name: greengrub-kafka
    ports:
      - "9002:9002"
      - "9003:9003"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9002,CONTROLLER://:9003
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9002
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@localhost:9003
      ALLOW_PLAINTEXT_LISTENER: "yes"
    networks:
      - microservice-net

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: greengrub-kafka-ui
    ports:
      - "8890:8880"
    environment:
      SERVER_PORT: 8880
      KAFKA_CLUSTERS_0_NAME: greengrub
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9002
    networks:
      - microservice-net

  maildev:
    image: maildev/maildev
    container_name: greengrub-maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - microservice-net


networks:
  microservice-net:
    driver: bridge