# ──────────────────────────────────────────────────────────────────────────────
# Notification Service  –  Deployment + HPA + Service
# Namespace : services
# Resource Plan : CPU req 120m / limit 250m | Mem req 160Mi / limit 400Mi
# HPA : minReplicas 1, maxReplicas 4, CPU 65%, Memory 75%
# NOTE: Running on self-managed kubeadm cluster (not GKE).
#       GCP auth uses Application Default Credentials via the VM metadata server.
#       The k8s node VM's service account must have Cloud Datastore User role
#       assigned in GCP IAM.
#       HPA requires metrics-server to be installed on the cluster.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: services
  labels:
    app: notification-service
    component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8084"
        prometheus.io/path:   "/actuator/prometheus"
    spec:
      serviceAccountName: services-sa
      containers:
        - name: notification-service
          image: IMAGE_NAME
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: utility-config-mirror
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: GCP_FIRESTORE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: GCP_FIRESTORE_PROJECT_ID
            - name: MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: MAIL_HOST
            - name: MAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: MAIL_PORT
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: MAIL_PASSWORD
          resources:
            requests:
              cpu:    "120m"
              memory: "160Mi"
            limits:
              cpu:    "250m"
              memory: "400Mi"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 0
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: services
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 80
      targetPort: 8084
  type: ClusterIP
