spring.application.name=image-service

grpc.server.port=9090
server.port=8080
#disable fire store in local profile
spring.cloud.gcp.firestore.enabled=false
spring.cloud.gcp.storage.enabled=false

spring.autoconfigure.exclude=com.google.cloud.spring.autoconfigure.firestore.GcpFirestoreAutoConfiguration,com.google.cloud.spring.autoconfigure.firestore.FirestoreRepositoriesAutoConfiguration,com.google.cloud.spring.autoconfigure.firestore.FirestoreTransactionManagerAutoConfiguration,com.google.cloud.spring.autoconfigure.storage.GcpStorageAutoConfiguration

# --- Resilience4j ---

# Retry: MongoDB transient failures (3 attempts, exponential backoff: 500ms -> 1s -> 2s)
resilience4j.retry.instances.mongoRetry.max-attempts=3
resilience4j.retry.instances.mongoRetry.wait-duration=500ms
resilience4j.retry.instances.mongoRetry.enable-exponential-backoff=true
resilience4j.retry.instances.mongoRetry.exponential-backoff-multiplier=2
resilience4j.retry.instances.mongoRetry.retry-exceptions=com.greengrub.image_service.exception.ImageStorageException

# Circuit Breaker: local MongoDB (lighter thresholds - dev environment)
resilience4j.circuitbreaker.instances.mongoBreaker.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.mongoBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.mongoBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.mongoBreaker.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.mongoBreaker.register-health-indicator=true