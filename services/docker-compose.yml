version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: greengrub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greengrub
    ports:
      - "5432:5432"
    networks:
      - microservice-net

  adminer:
    image: adminer
    container_name: greengrub-adminer
    ports:
      - "8088:8080"
    networks:
      - microservice-net

  mongodb:
    image: mongo
    container_name: greengrub-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo:/data
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - microservice-net

  mongo-express:
    image: mongo-express
    container_name: greengrub-mongo-ui
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
    ports:
      - "8089:8081"
    networks:
      - microservice-net

  kafka:
    image: bitnamilegacy/kafka:3.6
    container_name: greengrub-kafka
    ports:
      - "9002:9002"
      - "9003:9003"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9002,CONTROLLER://:9003
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9002
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@localhost:9003
      ALLOW_PLAINTEXT_LISTENER: "yes"
    networks:
      - microservice-net

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: greengrub-kafka-ui
    ports:
      - "8890:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: greengrub
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9002
    networks:
      - microservice-net

  maildev:
    image: maildev/maildev
    container_name: greengrub-maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - microservice-net
  
  redis:
    image: redis:7.2-alpine
    container_name: greengrub-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - microservice-net


  # ── ELK Stack ────────────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: greengrub-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - microservice-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: greengrub-logstash
    ports:
      - "5044:5044"   # Beats / Logback-Logstash appender
      - "9600:9600"   # Logstash monitoring API
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - microservice-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: greengrub-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - microservice-net

  # ── Monitoring ───────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: greengrub-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - microservice-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: greengrub-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - microservice-net

networks:
  microservice-net:
    driver: bridge

volumes:
  elasticsearch-data:
  grafana-data:
  mongo: