# ──────────────────────────────────────────────────────────────────────────────
# ServiceMonitors for all GreenGrub microservices
# Namespace : monitoring  (Prometheus looks for ServiceMonitors here)
# Label     : release: monitoring  (must match helm release name)
# Target NS : services
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gateway-service
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - services
  selector:
    matchLabels:
      app: gateway-service
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      metricRelabelings:
        - sourceLabels: [app]
          targetLabel: application
        - sourceLabels: [kubernetes_namespace]
          targetLabel: namespace

