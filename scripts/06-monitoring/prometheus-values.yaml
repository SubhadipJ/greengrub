# ──────────────────────────────────────────────────────────────────────────────
# kube-prometheus-stack  –  Helm values
# Chart   : prometheus-community/kube-prometheus-stack
# Release : monitoring
# Namespace: monitoring
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring \
#     --create-namespace \
#     -f prometheus-values.yaml
# ──────────────────────────────────────────────────────────────────────────────

prometheus:
  prometheusSpec:
    nodeSelector:
      node-role: monitoring

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues:     false

    # Scrape interval – keep short enough for HPA reaction time
    scrapeInterval:     "30s"
    evaluationInterval: "30s"

    # Retention
    retention: "15d"

    # Resource allocation (from resource planning – Monitoring namespace)
    resources:
      requests:
        cpu:    "80m"
        memory: "250Mi"
      limits:
        cpu:    "200m"
        memory: "450Mi"

    # Persistent storage for metrics
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Additional scrape config – picks up services annotated with
    # prometheus.io/scrape: "true"  (all Spring Boot pods carry this)
    additionalScrapeConfigs:
      - job_name: "spring-boot-services"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["services"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

grafana:
  enabled: true

  nodeSelector:
    node-role: monitoring

  resources:
    requests:
      cpu:    "50m"
      memory: "384Mi"
    limits:
      cpu:    "150m"
      memory: "768Mi"

  # Default admin credentials – change before production
  adminUser:     "admin"
  adminPassword: "changeme"

  persistence:
    enabled: true
    size: 2Gi

  # Pre-load a Spring Boot dashboard (Grafana dashboard ID 12900)
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      spring-boot:
        gnetId: 12900
        revision: 1
        datasource: Prometheus
      jvm-micrometer:
        gnetId: 4701
        revision: 1
        datasource: Prometheus

alertmanager:
  enabled: true
  alertmanagerSpec:
    nodeSelector:
      node-role: monitoring
    resources:
      requests:
        cpu:    "30m"
        memory: "64Mi"
      limits:
        cpu:    "80m"
        memory: "128Mi"

# Node-level metrics for GKE nodes
nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

kube-state-metrics:
  nodeSelector:
    node-role: monitoring
