# ──────────────────────────────────────────────────────────────────────────────
# Utility Namespace  –  Redis Deployment + Service
# Resource Plan : CPU req 50m / limit 300m | Mem req 200Mi / limit 350Mi
# Replicas : 1  (kept for future use — not wired into current codebase)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: utility
  labels:
    app: redis
    component: cache
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        component: cache
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-node
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          args: ["--save", ""]   # disable persistence for in-memory-only mode
          resources:
            requests:
              cpu:    "50m"
              memory: "200Mi"
            limits:
              cpu:    "300m"
              memory: "350Mi"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: utility
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP
