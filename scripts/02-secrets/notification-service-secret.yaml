# ──────────────────────────────────────────────────────────────────────────────
# PRIVATE — DO NOT COMMIT TO GIT
# Notification Service Secret  –  apply manually inside the cluster
# kubectl apply -f notification-service-secret.yaml -n services
#
# Note: GCP auth uses Application Default Credentials via the VM metadata server.
#       No SA key needed — ensure the VM's service account has:
#         roles/datastore.user  (Firestore access)
#
# Gmail App Password:
#   Generate at https://myaccount.google.com/apppasswords
#   (requires 2FA enabled on the Gmail account)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
  namespace: services
type: Opaque
stringData:
  MAIL_HOST:                "smtp.gmail.com"
  MAIL_PORT:                "587"
  MAIL_USERNAME:            "<your-gmail-address>"
  MAIL_PASSWORD:            "<your-gmail-app-password>"
  GCP_FIRESTORE_PROJECT_ID: "<your-gcp-project-id>"
