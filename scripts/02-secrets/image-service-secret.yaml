# ──────────────────────────────────────────────────────────────────────────────
# PRIVATE — DO NOT COMMIT TO GIT
# Image Service Secret  –  apply manually inside the cluster
# kubectl apply -f image-service-secret.yaml -n services
#
# GCS setup:
#   1. Create a GCS bucket in your GCP project
#   2. Grant the VM's service account  roles/storage.objectAdmin  on the bucket
#      (no SA key needed — uses Application Default Credentials via VM metadata)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: image-service-secret
  namespace: services
type: Opaque
stringData:
  GCS_BUCKET_NAME:      "<your-gcs-bucket-name>"
  GCS_STORAGE_BASE_URL: "https://storage.googleapis.com"
