# ──────────────────────────────────────────────────────────────────────────────
# PRIVATE — DO NOT COMMIT TO GIT
# Donation Service Secret  –  apply manually inside the cluster
# kubectl apply -f donation-service-secret.yaml -n services
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: donation-service-secret
  namespace: services
type: Opaque
stringData:
  DB_USERNAME:           "<your-db-username>"
  DB_PASSWORD:           "<your-db-password>"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://<cloud-sql-public-ip>:5432/<db-name>"
