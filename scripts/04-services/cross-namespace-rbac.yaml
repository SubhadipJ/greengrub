# ──────────────────────────────────────────────────────────────────────────────
# Cross-Namespace RBAC — allow services-sa (services ns) to read ConfigMaps
# from the utility namespace so pods can consume KAFKA_BOOTSTRAP_SERVERS etc.
#
# Apply order:
#   1. ServiceAccount  (services namespace)
#   2. Role            (utility namespace)
#   3. RoleBinding     (utility namespace — binds the Role to services-sa)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: services-sa
  namespace: services
---
# Role lives in utility so its rules apply to ConfigMaps in that namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: utility-configmap-reader
  namespace: utility
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs:     ["get", "list", "watch"]
---
# Bind the Role to services-sa even though services-sa lives in a different namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: services-read-utility-configmaps
  namespace: utility
subjects:
  - kind:      ServiceAccount
    name:      services-sa
    namespace: services
roleRef:
  kind:     Role
  name:     utility-configmap-reader
  apiGroup: rbac.authorization.k8s.io
